{% extends "base.html" %}

{% block title %}Forgot password — The Publishing Company{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Forgot password</h1>
  <p class="subtitle">Enter your email and we'll send you a reset link.</p>

  <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      autofocus
      autocomplete="email"
    >

    <button type="submit" class="btn btn-primary">Send reset link</button>
  </form>

  <p class="auth-footer">
    <a href="{{ url_for('login') }}">Back to login</a>
  </p>
</div>
{% endblock %}
