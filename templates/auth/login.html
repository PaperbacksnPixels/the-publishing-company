{% extends "base.html" %}

{% block title %}Log in — The Publishing Company{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Log in</h1>
  <p class="subtitle">Welcome back. Access your project portal.</p>

  <form method="POST" action="{{ url_for('login') }}" class="auth-form">
    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      autofocus
      autocomplete="email"
    >

    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      required
      autocomplete="current-password"
    >

    <button type="submit" class="btn btn-primary">Log in</button>
  </form>

  <p class="auth-footer">
    <a href="{{ url_for('forgot_password') }}">Forgot your password?</a>
  </p>
</div>
{% endblock %}
