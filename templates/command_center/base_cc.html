{% extends "base.html" %}

{% block title %}Command Center — The Publishing Company{% endblock %}

{% block content %}
<div class="command-center">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div>
      <h1>Command Center</h1>
      <p class="subtitle">{{ session.get('email') }}</p>
    </div>
    <a href="{{ url_for('project_startup') }}" class="btn-new-project">+ New Project</a>
  </div>

  {# Tab navigation #}
  <nav class="cc-tabs">
    <a href="{{ url_for('command_center', tab='tasks') }}"
       class="cc-tab {% if tab == 'tasks' %}active{% endif %}">
      Tasks
    </a>
    <a href="{{ url_for('command_center', tab='projects') }}"
       class="cc-tab {% if tab == 'projects' %}active{% endif %}">
      Projects
    </a>
    <a href="{{ url_for('command_center', tab='partners') }}"
       class="cc-tab {% if tab == 'partners' %}active{% endif %}">
      Partners
    </a>
  </nav>

  <div class="cc-content">
    {% block cc_content %}{% endblock %}
  </div>
</div>

<style>
  .cc-tabs {
    display: flex;
    gap: 0;
    border-bottom: 3px solid #222;
    margin-bottom: 1.5rem;
  }
  .cc-tab {
    padding: 0.75rem 1.5rem;
    text-decoration: none;
    color: #666;
    font-weight: bold;
    border: 2px solid transparent;
    border-bottom: none;
    margin-bottom: -3px;
  }
  .cc-tab:hover {
    color: #222;
    background: #f5f5f0;
  }
  .cc-tab.active {
    color: #222;
    background: #fff;
    border: 3px solid #222;
    border-bottom: 3px solid #fff;
  }

  /* Summary cards */
  .cc-summary {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .cc-summary-card {
    flex: 1;
    min-width: 150px;
    padding: 1rem;
    border: 2px solid #222;
    background: #fff;
  }
  .cc-summary-card h3 {
    margin: 0 0 0.25rem 0;
    font-size: 0.85rem;
    color: #666;
    text-transform: uppercase;
  }
  .cc-summary-card .number {
    font-size: 1.8rem;
    font-weight: bold;
  }
  .cc-summary-card .number.danger { color: #c0392b; }
  .cc-summary-card .number.warning { color: #e67e22; }
  .cc-summary-card .number.success { color: #27ae60; }

  /* Task/project table */
  .cc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  .cc-table th {
    text-align: left;
    padding: 0.5rem;
    border-bottom: 2px solid #222;
    font-size: 0.8rem;
    text-transform: uppercase;
    color: #666;
  }
  .cc-table td {
    padding: 0.5rem;
    border-bottom: 1px solid #ddd;
    vertical-align: top;
  }
  .cc-table tr:hover {
    background: #f5f5f0;
  }
  .cc-table tr.overdue td {
    background: #fdecea;
  }
  .cc-table tr.due-soon td {
    background: #fff8e1;
  }

  /* Inline status select */
  .status-select {
    padding: 0.25rem 0.5rem;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .status-select.changed {
    border-color: #27ae60;
    background: #eafaf1;
  }

  /* Quick action buttons */
  .btn-small {
    padding: 0.2rem 0.6rem;
    font-size: 0.8rem;
    border: 1px solid #222;
    background: #fff;
    cursor: pointer;
  }
  .btn-small:hover {
    background: #222;
    color: #fff;
  }
  .btn-new-project {
    background: #27ae60;
    color: #fff;
    border: 2px solid #222;
    padding: 8px 20px;
    font-weight: bold;
    font-size: 0.9rem;
    text-decoration: none;
    box-shadow: 3px 3px 0 #222;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-new-project:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 #222;
    color: #fff;
  }
</style>
{% endblock %}
